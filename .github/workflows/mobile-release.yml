name: Mobile Android Release

"on":
  push:
    branches:
      - main
    tags:
      - "mobile-v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish APK to the DlaFlow VPS release directory"
        required: true
        default: false
        type: boolean
      channel:
        description: "Release channel written into latest.json"
        required: true
        default: test
        type: choice
        options:
          - test
          - production
      update_priority:
        description: "Mobile update priority"
        required: true
        default: normal
        type: choice
        options:
          - normal
          - important
          - required
      min_supported_version_code:
        description: "Lowest app versionCode allowed before update becomes required"
        required: true
        default: "1"
        type: string
      release_title:
        description: "Business title shown in the Android update popup"
        required: true
        default: "Nowa wersja DlaFlow"
        type: string

env:
  RELEASE_CHANNEL: ${{ github.event.inputs.channel || (startsWith(github.ref, 'refs/tags/mobile-v') && 'production') || 'test' }}
  UPDATE_PRIORITY: ${{ github.event.inputs.update_priority || 'normal' }}
  MIN_SUPPORTED_VERSION_CODE: ${{ github.event.inputs.min_supported_version_code || '1' }}
  RELEASE_TITLE: ${{ github.event.inputs.release_title || 'Nowa wersja DlaFlow' }}

jobs:
  build:
    name: Build APK and publish release manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Verify mobile repository contract
        shell: pwsh
        run: ./scripts/verify-repository-contract.ps1

      - name: Verify mobile design-system boundary
        shell: pwsh
        run: ./scripts/verify-design-system-boundary.ps1

      - name: Run Android unit tests and lint
        shell: bash
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Validate mobile tag version
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#mobile-v}"
          app_version="$(grep -E 'versionName\s*=' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag_version" != "$app_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Android versionName ${app_version}."
            exit 1
          fi

      - name: Prepare release signing
        if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event.inputs.publish == 'true'
        shell: bash
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for name in ANDROID_SIGNING_KEYSTORE_BASE64 ANDROID_SIGNING_STORE_PASSWORD ANDROID_SIGNING_KEY_ALIAS ANDROID_SIGNING_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::GitHub secret ${name} is required to build a signed Android release APK."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          printf '%s' "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/dlaflow-mobile-release.jks"
          {
            echo "ANDROID_SIGNING_STORE_FILE=$RUNNER_TEMP/dlaflow-mobile-release.jks"
            echo "ANDROID_SIGNING_STORE_PASSWORD=$ANDROID_SIGNING_STORE_PASSWORD"
            echo "ANDROID_SIGNING_KEY_ALIAS=$ANDROID_SIGNING_KEY_ALIAS"
            echo "ANDROID_SIGNING_KEY_PASSWORD=$ANDROID_SIGNING_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/mobile-v* || "${{ github.event.inputs.publish }}" == "true" ]]; then
            ./gradlew :app:assembleRelease --no-daemon
            echo "DLAFLOW_APK_PATH=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
          else
            ./gradlew :app:assembleDebug --no-daemon
            echo "DLAFLOW_APK_PATH=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"
          fi

      - name: Fetch current published manifest
        if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event.inputs.publish == 'true'
        shell: bash
        env:
          MOBILE_RELEASE_SSH_HOST: ${{ secrets.MOBILE_RELEASE_SSH_HOST }}
          MOBILE_RELEASE_SSH_USER: ${{ secrets.MOBILE_RELEASE_SSH_USER }}
          MOBILE_RELEASE_SSH_KEY: ${{ secrets.MOBILE_RELEASE_SSH_KEY }}
          MOBILE_RELEASE_SSH_PORT: ${{ secrets.MOBILE_RELEASE_SSH_PORT }}
          MOBILE_RELEASE_DIR: ${{ secrets.MOBILE_RELEASE_DIR }}
        run: |
          set -euo pipefail

          missing=0
          for name in MOBILE_RELEASE_SSH_HOST MOBILE_RELEASE_SSH_USER MOBILE_RELEASE_SSH_KEY MOBILE_RELEASE_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error::GitHub secret ${name} is required to compare the Android release version."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          case "$MOBILE_RELEASE_DIR" in
            *[[:space:]]*|*"'"*)
              echo "::error::MOBILE_RELEASE_DIR must not contain spaces or single quotes."
              exit 1
              ;;
          esac

          port="${MOBILE_RELEASE_SSH_PORT:-22}"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$MOBILE_RELEASE_SSH_KEY" > "$HOME/.ssh/mobile_release_key"
          chmod 600 "$HOME/.ssh/mobile_release_key"
          ssh-keyscan -p "$port" -H "$MOBILE_RELEASE_SSH_HOST" >> "$HOME/.ssh/known_hosts"
          mkdir -p mobile-release-previous

          if ssh -p "$port" -i "$HOME/.ssh/mobile_release_key" "$MOBILE_RELEASE_SSH_USER@$MOBILE_RELEASE_SSH_HOST" "test -s '$MOBILE_RELEASE_DIR/latest.json'"; then
            scp -P "$port" -i "$HOME/.ssh/mobile_release_key" "$MOBILE_RELEASE_SSH_USER@$MOBILE_RELEASE_SSH_HOST:$MOBILE_RELEASE_DIR/latest.json" mobile-release-previous/latest.json
          else
            echo "No previous Android release manifest found on VPS."
          fi

      - name: Generate panel release manifest
        shell: pwsh
        env:
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          $previousManifest = "mobile-release-previous/latest.json"
          if (-not (Test-Path -LiteralPath $previousManifest -PathType Leaf)) {
            $previousManifest = ""
          }

          ./scripts/generate-mobile-release-manifest.ps1 `
            -ApkPath "$env:DLAFLOW_APK_PATH" `
            -OutputDir "mobile-release" `
            -Channel "${{ env.RELEASE_CHANNEL }}" `
            -UpdatePriority "${{ env.UPDATE_PRIORITY }}" `
            -MinSupportedVersionCode ${{ env.MIN_SUPPORTED_VERSION_CODE }} `
            -ReleaseTitle "${{ env.RELEASE_TITLE }}" `
            -PreviousManifestPath "$previousManifest"

      - name: Inspect release package
        shell: bash
        run: |
          set -euo pipefail
          test -s mobile-release/latest.json
          node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('mobile-release/latest.json','utf8')); for (const key of ['channel','fileName','minSupportedVersionCode','releaseNotes','releaseTitle','releasedAt','sha256','sizeBytes','updatePriority','versionCode','versionName']) { if (!(key in m)) throw new Error('missing '+key); } console.log(JSON.stringify(m, null, 2));"
          apk_file="$(node -e "console.log(require('./mobile-release/latest.json').fileName)")"
          test -s "mobile-release/$apk_file"

      - name: Publish to DlaFlow VPS
        if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event.inputs.publish == 'true'
        shell: bash
        env:
          MOBILE_RELEASE_SSH_HOST: ${{ secrets.MOBILE_RELEASE_SSH_HOST }}
          MOBILE_RELEASE_SSH_USER: ${{ secrets.MOBILE_RELEASE_SSH_USER }}
          MOBILE_RELEASE_SSH_KEY: ${{ secrets.MOBILE_RELEASE_SSH_KEY }}
          MOBILE_RELEASE_SSH_PORT: ${{ secrets.MOBILE_RELEASE_SSH_PORT }}
          MOBILE_RELEASE_DIR: ${{ secrets.MOBILE_RELEASE_DIR }}
        run: |
          set -euo pipefail

          missing=0
          for name in MOBILE_RELEASE_SSH_HOST MOBILE_RELEASE_SSH_USER MOBILE_RELEASE_SSH_KEY MOBILE_RELEASE_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error::GitHub secret ${name} is required to publish the Android APK."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          case "$MOBILE_RELEASE_DIR" in
            *[[:space:]]*|*"'"*)
              echo "::error::MOBILE_RELEASE_DIR must not contain spaces or single quotes."
              exit 1
              ;;
          esac

          port="${MOBILE_RELEASE_SSH_PORT:-22}"
          apk_file="$(node -e "console.log(require('./mobile-release/latest.json').fileName)")"
          apk_sha="$(node -e "console.log(require('./mobile-release/latest.json').sha256)")"
          remote_tmp="${MOBILE_RELEASE_DIR}/.upload-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$MOBILE_RELEASE_SSH_KEY" > "$HOME/.ssh/mobile_release_key"
          chmod 600 "$HOME/.ssh/mobile_release_key"
          ssh-keyscan -p "$port" -H "$MOBILE_RELEASE_SSH_HOST" >> "$HOME/.ssh/known_hosts"

          ssh -p "$port" -i "$HOME/.ssh/mobile_release_key" "$MOBILE_RELEASE_SSH_USER@$MOBILE_RELEASE_SSH_HOST" "mkdir -p '$MOBILE_RELEASE_DIR' '$remote_tmp'"
          scp -P "$port" -i "$HOME/.ssh/mobile_release_key" "mobile-release/$apk_file" "mobile-release/latest.json" "$MOBILE_RELEASE_SSH_USER@$MOBILE_RELEASE_SSH_HOST:$remote_tmp/"
          ssh -p "$port" -i "$HOME/.ssh/mobile_release_key" "$MOBILE_RELEASE_SSH_USER@$MOBILE_RELEASE_SSH_HOST" "cd '$remote_tmp' && test -s latest.json && test -s '$apk_file' && mv '$apk_file' '$MOBILE_RELEASE_DIR/$apk_file' && mv latest.json '$MOBILE_RELEASE_DIR/latest.json' && cd '$MOBILE_RELEASE_DIR' && echo '$apk_sha  $apk_file' | sha256sum -c - && rmdir '$remote_tmp'"
